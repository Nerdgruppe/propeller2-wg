---

test-cases:
  - name: Baseline (empty)
    measure: ""
    expect: 0
  - name: Baseline (NOP)
    measure: NOP
    expect: 2
  - name: Pixelmixer (ADDPIX)
    measure: "ADDPIX tmp, 0"
    data: "var tmp: LONG 0"
    expect: 7
  - name: Cordic Schedule (QMUL)
    measure: "QMUL 0, 0"
    expect: [2,9,8,7,6,5,4,3]
  - name: "Waiting (WAITX 0)"
    measure: "WAITX 0"
    expect: 2
  - name: "Waiting (WAITX 3)"
    measure: "WAITX 3"
    expect: 5
  - name: Cordic Fetch Result (GETXY)
    prepare: "QMUL 0, 0"
    measure: "GETQX tmp"
    data: "var tmp: LONG 0"
    expect: 2
  - name: Cordic Schedule and Fetch Result (GETXY)
    measure: |
      QMUL  0, 0 // takes 2..9
      GETQX tmp  // takes 58
    data: "var tmp: LONG 0"
    expect: [60, 67, 66, 65, 64, 63, 62, 61]
  - name: "Jump Timing (JMP A)"
    measure: |
      JMP nextline
      nextline:
    expect: 4
  - name: "Jump Timing (JMP nrel(A))"
    measure: |
      JMP nrel(nextline)
      nextline:
    expect: 4
  - name: "Cog Startup (cogexec, cog 1)"
    measure: |
      COGINIT 0b0_0_0001, hubaddr(cog2code) // start COG 1
      WAITATN                               // wait until we're called
      RDLONG rt_result, hubaddr(shared_global)
      SUB rt_result, rt_start_ct
    data: |
      cog2code:
        GETCT shared_global
        WRLONG shared_global, hubaddr(shared_global)
        COGATN 1 // call back to the main system
        COGSTOP 1 // halt ourselves
      var shared_global: LONG 0
    # NOTE: This values are not only depending on our own cog phase but also COG 1 phase!
    expect_result: [534, 541, 540, 539, 538, 537, 536, 535]
